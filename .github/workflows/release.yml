name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: agent-launcher-safe
            archive: tar.gz
            cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: agent-launcher-safe
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: agent-launcher-safe
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: agent-launcher-safe
            archive: tar.gz
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: agent-launcher-safe
            archive: tar.gz
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: agent-launcher-safe.exe
            archive: zip
            cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup cross
        if: matrix.cross == true
        shell: bash
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar -xz -C /tmp
          mv /tmp/cross /usr/local/bin/cross

      - name: Build (native)
        if: matrix.cross == false
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        shell: bash
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare dist
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" dist/

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd dist && tar -czf "../agent-launcher-safe-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" . && cd ..

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd dist && 7z a "../agent-launcher-safe-${{ github.ref_name }}-${{ matrix.target }}.zip" . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: agent-launcher-safe-${{ github.ref_name }}-${{ matrix.target }}
          path: agent-launcher-safe-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: 'artifacts/**/*'
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
